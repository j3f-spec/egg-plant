<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productst</title>
</head>
<body>
    <div th:replace="~{layout :: title('Products')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-box"></i> Product Management</h1>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <select class="form-select" id="eggTypeFilter">
                        <option value="">All Egg Types</option>
                        <option value="CHICKEN">Chicken</option>
                        <option value="DUCK">Duck</option>
                        <option value="QUAIL">Quail</option>
                        <option value="GOOSE">Goose</option>
                        <option value="ORGANIC">Organic</option>
                        <option value="FREE_RANGE">Free Range</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sizeFilter">
                        <option value="">All Sizes</option>
                        <option value="SMALL">Small</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LARGE">Large</option>
                        <option value="EXTRA_LARGE">Extra Large</option>
                        <option value="JUMBO">Jumbo</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100" onclick="filterProducts()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Egg Type</th>
                                    <th>Size</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <!-- Products will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Egg Type</label>
                                    <select class="form-select" name="eggType" required>
                                        <option value="">Select Type</option>
                                        <option value="CHICKEN">Chicken</option>
                                        <option value="DUCK">Duck</option>
                                        <option value="QUAIL">Quail</option>
                                        <option value="GOOSE">Goose</option>
                                        <option value="ORGANIC">Organic</option>
                                        <option value="FREE_RANGE">Free Range</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Size</label>
                                    <select class="form-select" name="size" required>
                                        <option value="">Select Size</option>
                                        <option value="SMALL">Small</option>
                                        <option value="MEDIUM">Medium</option>
                                        <option value="LARGE">Large</option>
                                        <option value="EXTRA_LARGE">Extra Large</option>
                                        <option value="JUMBO">Jumbo</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" step="0.01" class="form-control" name="price" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Stock Quantity</label>
                                    <input type="number" class="form-control" name="stockQuantity" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Image URL</label>
                                    <input type="url" class="form-control" name="imageUrl">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addProduct()">Add Product</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editProductForm">
                        <input type="hidden" name="id">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Egg Type</label>
                                    <select class="form-select" name="eggType" required>
                                        <option value="">Select Type</option>
                                        <option value="CHICKEN">Chicken</option>
                                        <option value="DUCK">Duck</option>
                                        <option value="QUAIL">Quail</option>
                                        <option value="GOOSE">Goose</option>
                                        <option value="ORGANIC">Organic</option>
                                        <option value="FREE_RANGE">Free Range</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Size</label>
                                    <select class="form-select" name="size" required>
                                        <option value="">Select Size</option>
                                        <option value="SMALL">Small</option>
                                        <option value="MEDIUM">Medium</option>
                                        <option value="LARGE">Large</option>
                                        <option value="EXTRA_LARGE">Extra Large</option>
                                        <option value="JUMBO">Jumbo</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" step="0.01" class="form-control" name="price" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Stock Quantity</label>
                                    <input type="number" class="form-control" name="stockQuantity" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Image URL</label>
                                    <input type="url" class="form-control" name="imageUrl">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateProduct()">Update Product</button>
                </div>
            </div>
        </div>
    </div>

    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>-->
    <script>
        let currentProducts = [];

        $(document).ready(function() {
            loadProducts();
        });

        function loadProducts() {
            $.get('/api/products', function(data) {
                currentProducts = data;
                displayProducts(data);
            });
        }

        function displayProducts(products) {
            const tbody = $('#productsTableBody');
            tbody.empty();
            
            products.forEach(product => {
                const stockStatus = product.stockQuantity > 10 ? 
                    '<span class="badge bg-success">In Stock</span>' : 
                    '<span class="badge bg-warning">Low Stock</span>';
                
                const row = `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${product.eggType}</td>
                        <td>${product.size}</td>
                        <td>$${product.price.toFixed(2)}</td>
                        <td>${product.stockQuantity}</td>
                        <td>${stockStatus}</td>
                        <td class="table-actions">
                            <button class="btn btn-sm btn-outline-primary" onclick="editProduct(${product.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${product.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function filterProducts() {
            const eggType = $('#eggTypeFilter').val();
            const size = $('#sizeFilter').val();
            const search = $('#searchInput').val().toLowerCase();
            
            let filtered = currentProducts;
            
            if (eggType) {
                filtered = filtered.filter(p => p.eggType === eggType);
            }
            
            if (size) {
                filtered = filtered.filter(p => p.size === size);
            }
            
            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search)
                );
            }
            
            displayProducts(filtered);
        }

        function addProduct() {
            const formData = $('#addProductForm').serialize();
            
            $.post('/api/products', formData, function(data) {
                $('#addProductModal').modal('hide');
                $('#addProductForm')[0].reset();
                loadProducts();
                alert('Product added successfully!');
            }).fail(function() {
                alert('Error adding product. Please try again.');
            });
        }

        function editProduct(id) {
            const product = currentProducts.find(p => p.id === id);
            if (product) {
                const form = $('#editProductForm');
                form.find('[name="id"]').val(product.id);
                form.find('[name="name"]').val(product.name);
                form.find('[name="eggType"]').val(product.eggType);
                form.find('[name="size"]').val(product.size);
                form.find('[name="price"]').val(product.price);
                form.find('[name="stockQuantity"]').val(product.stockQuantity);
                form.find('[name="imageUrl"]').val(product.imageUrl || '');
                form.find('[name="description"]').val(product.description || '');
                
                $('#editProductModal').modal('show');
            }
        }

        function updateProduct() {
            const id = $('#editProductForm [name="id"]').val();
            const formData = $('#editProductForm').serialize();
            
            $.ajax({
                url: `/api/products/${id}`,
                method: 'PUT',
                data: formData,
                success: function(data) {
                    $('#editProductModal').modal('hide');
                    loadProducts();
                    alert('Product updated successfully!');
                },
                error: function() {
                    alert('Error updating product. Please try again.');
                }
            });
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                $.ajax({
                    url: `/api/products/${id}`,
                    method: 'DELETE',
                    success: function() {
                        loadProducts();
                        alert('Product deleted successfully!');
                    },
                    error: function() {
                        alert('Error deleting product. Please try again.');
                    }
                });
            }
        }
    </script>
</body>
</html>
