<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>
</head>
<body>
    <div th:replace="~{layout :: title('Customers')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-users"></i> Customer Management</h1>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
                        <i class="fas fa-plus"></i> Add Customer
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-8">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search customers by name or email...">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-outline-secondary w-100" onclick="searchCustomers()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Orders</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="customersTableBody">
                                <!-- Customers will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div class="modal fade" id="addCustomerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCustomerForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" name="firstName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" name="lastName" required>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" name="address" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
                </div>
            </div>
        </div>
    </div>

    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script-->
    <script>
        let currentCustomers = [];

        $(document).ready(function() {
            loadCustomers();
        });

        function loadCustomers() {
            $.get('/api/customers', function(data) {
                currentCustomers = data;
                displayCustomers(data);
            });
        }

        function displayCustomers(customers) {
            const tbody = $('#customersTableBody');
            tbody.empty();
            
            customers.forEach(customer => {
                const orderCount = customer.orders ? customer.orders.length : 0;
                const row = `
                    <tr>
                        <td>${customer.id}</td>
                        <td>${customer.firstName} ${customer.lastName}</td>
                        <td>${customer.email}</td>
                        <td>${customer.phone}</td>
                        <td>${orderCount}</td>
                        <td class="table-actions">
                            <button class="btn btn-sm btn-outline-primary" onclick="viewOrders(${customer.id})">
                                <i class="fas fa-shopping-cart"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info" onclick="editCustomer(${customer.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${customer.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function searchCustomers() {
            const search = $('#searchInput').val().toLowerCase();
            
            const filtered = currentCustomers.filter(customer => 
                customer.firstName.toLowerCase().includes(search) ||
                customer.lastName.toLowerCase().includes(search) ||
                customer.email.toLowerCase().includes(search)
            );
            
            displayCustomers(filtered);
        }

        function addCustomer() {
            const formData = $('#addCustomerForm').serialize();
            
            $.post('/api/customers', formData, function(data) {
                $('#addCustomerModal').modal('hide');
                $('#addCustomerForm')[0].reset();
                loadCustomers();
                alert('Customer added successfully!');
            }).fail(function(xhr) {
                if (xhr.status === 409) {
                    alert('Email already exists!');
                } else {
                    alert('Error adding customer. Please try again.');
                }
            });
        }

        function editCustomer(id) {
            // Implementation for editing customer
            alert('Edit functionality would be implemented here');
        }

        function deleteCustomer(id) {
            if (confirm('Are you sure you want to delete this customer?')) {
                $.ajax({
                    url: `/api/customers/${id}`,
                    method: 'DELETE',
                    success: function() {
                        loadCustomers();
                        alert('Customer deleted successfully!');
                    },
                    error: function() {
                        alert('Error deleting customer. Please try again.');
                    }
                });
            }
        }

        function viewOrders(customerId) {
            window.location.href = `/orders?customer=${customerId}`;
        }
    </script>
</body>
</html>
