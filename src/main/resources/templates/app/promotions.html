<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions</title>
    <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">-->
</head>
<body>
    <div th:replace="~{layout :: title('Promotions')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-tags"></i> Promotion Management</h1>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPromotionModal">
                        <i class="fas fa-plus"></i> Add Promotion
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <select class="form-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="typeFilter">
                        <option value="">All Types</option>
                        <option value="PERCENTAGE_DISCOUNT">Percentage Discount</option>
                        <option value="FIXED_AMOUNT_DISCOUNT">Fixed Amount</option>
                        <option value="BUY_ONE_GET_ONE">Buy One Get One</option>
                        <option value="FREE_SHIPPING">Free Shipping</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search promotions...">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100" onclick="filterPromotions()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Discount</th>
                                    <th>Usage</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="promotionsTableBody">
                                <!-- Promotions will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Promotion Modal -->
    <div class="modal fade" id="addPromotionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Promotion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPromotionForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Promotion Code</label>
                                    <input type="text" class="form-control" name="code" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Promotion Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Type</label>
                                    <select class="form-select" name="type" required>
                                        <option value="">Select Type</option>
                                        <option value="PERCENTAGE_DISCOUNT">Percentage Discount</option>
                                        <option value="FIXED_AMOUNT_DISCOUNT">Fixed Amount</option>
                                        <option value="BUY_ONE_GET_ONE">Buy One Get One</option>
                                        <option value="FREE_SHIPPING">Free Shipping</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Discount Value</label>
                                    <input type="number" step="0.01" class="form-control" name="discountValue" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Minimum Order Amount</label>
                                    <input type="number" step="0.01" class="form-control" name="minimumOrderAmount" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Usage Limit</label>
                                    <input type="number" class="form-control" name="usageLimit">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Start Date</label>
                                    <input type="datetime-local" class="form-control" name="startDate" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">End Date</label>
                                    <input type="datetime-local" class="form-control" name="endDate" required>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addPromotion()">Add Promotion</button>
                </div>
            </div>
        </div>
    </div>

    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>-->
    <script>
        let currentPromotions = [];

        $(document).ready(function() {
            loadPromotions();
        });

        function loadPromotions() {
            $.get('/api/promotions', function(data) {
                currentPromotions = data;
                displayPromotions(data);
            });
        }

        function displayPromotions(promotions) {
            const tbody = $('#promotionsTableBody');
            tbody.empty();
            
            promotions.forEach(promotion => {
                const statusBadge = promotion.isActive ? 
                    '<span class="badge bg-success">Active</span>' : 
                    '<span class="badge bg-secondary">Inactive</span>';
                
                const discountText = getDiscountText(promotion.type, promotion.discountValue);
                const usageText = promotion.usageLimit ? 
                    `${promotion.usageCount}/${promotion.usageLimit}` : 
                    `${promotion.usageCount}/∞`;
                
                const row = `
                    <tr>
                        <td><code>${promotion.code}</code></td>
                        <td>${promotion.name}</td>
                        <td>${formatType(promotion.type)}</td>
                        <td>${discountText}</td>
                        <td>${usageText}</td>
                        <td>${statusBadge}</td>
                        <td class="table-actions">
                            <button class="btn btn-sm btn-outline-primary" onclick="editPromotion(${promotion.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deletePromotion(${promotion.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function getDiscountText(type, value) {
            switch(type) {
                case 'PERCENTAGE_DISCOUNT': return `${value}%`;
                case 'FIXED_AMOUNT_DISCOUNT': return `$${value}`;
                case 'BUY_ONE_GET_ONE': return 'BOGO';
                case 'FREE_SHIPPING': return 'Free Shipping';
                default: return value;
            }
        }

        function formatType(type) {
            return type.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        }

        function filterPromotions() {
            const status = $('#statusFilter').val();
            const type = $('#typeFilter').val();
            const search = $('#searchInput').val().toLowerCase();
            
            let filtered = currentPromotions;
            
            if (status !== '') {
                const isActive = status === 'true';
                filtered = filtered.filter(p => p.isActive === isActive);
            }
            
            if (type) {
                filtered = filtered.filter(p => p.type === type);
            }
            
            if (search) {
                filtered = filtered.filter(promotion => 
                    promotion.name.toLowerCase().includes(search) ||
                    promotion.code.toLowerCase().includes(search) ||
                    promotion.description.toLowerCase().includes(search)
                );
            }
            
            displayPromotions(filtered);
        }

        function addPromotion() {
            const formData = $('#addPromotionForm').serialize();
            
            $.post('/api/promotions', formData, function(data) {
                $('#addPromotionModal').modal('hide');
                $('#addPromotionForm')[0].reset();
                loadPromotions();
                alert('Promotion added successfully!');
            }).fail(function(xhr) {
                if (xhr.status === 409) {
                    alert('Promotion code already exists!');
                } else {
                    alert('Error adding promotion. Please try again.');
                }
            });
        }

        function editPromotion(id) {
            // Implementation for editing promotion
            alert('Edit functionality would be implemented here');
        }

        function deletePromotion(id) {
            if (confirm('Are you sure you want to delete this promotion?')) {
                $.ajax({
                    url: `/api/promotions/${id}`,
                    method: 'DELETE',
                    success: function() {
                        loadPromotions();
                        alert('Promotion deleted successfully!');
                    },
                    error: function() {
                        alert('Error deleting promotion. Please try again.');
                    }
                });
            }
        }
    </script>
</body>
</html>
