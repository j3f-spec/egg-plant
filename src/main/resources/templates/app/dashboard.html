<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Dashboard </title>
    <!--<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>-->
    <style>
        .stats-card {
            border-left: 4px solid #007bff;
            transition: transform 0.2s;
        }
        .stats-card:hover {
            transform: translateY(-2px);
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
    </style>
</head>

<body th:replace="~{layout :: body}">
    <div th:replace="~{layout :: title('Dashboard')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <h1 class="mb-4"><i class="fas fa-tachometer-alt"></i> Sales Dashboard</h1>

            <!-- Stats Cards -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card stats-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Total Revenue</h6>
                                    <h3 class="mb-0" id="totalRevenue">$0</h3>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-dollar-sign fa-2x text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card" style="border-left-color: #28a745;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Total Orders</h6>
                                    <h3 class="mb-0" id="totalOrders">0</h3>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-shopping-cart fa-2x text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card" style="border-left-color: #ffc107;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Total Customers</h6>
                                    <h3 class="mb-0" id="totalCustomers">0</h3>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-users fa-2x text-warning"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card" style="border-left-color: #dc3545;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Products</h6>
                                    <h3 class="mb-0" id="totalProducts">0</h3>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-box fa-2x text-danger"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="row mb-4">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Sales Trend (Last 30 Days)</h5>
                        </div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="salesChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Order Status</h5>
                        </div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="orderStatusChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Additional Stats Row -->
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Top Selling Products</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Product</th>
                                            <th>Quantity Sold</th>
                                            <th>Revenue</th>
                                        </tr>
                                    </thead>
                                    <tbody id="topProductsTable">
                                        <!-- Will be populated by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Recent Orders</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Order ID</th>
                                            <th>Customer</th>
                                            <th>Amount</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="recentOrdersTable">
                                        <!-- Will be populated by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>-->
    <script>
        $(document).ready(function() {
            loadDashboardData();
        });

        function loadDashboardData() {
            // Load basic stats
            $.get('/api/orders/stats/revenue/total', function(data) {
                $('#totalRevenue').text('$' + (data ? data.toFixed(2) : '0.00'));
            });

            $.get('/api/orders/stats/total', function(data) {
                $('#totalOrders').text(data || 0);
            });

            $.get('/api/customers/stats/total', function(data) {
                $('#totalCustomers').text(data || 0);
            });

            $.get('/api/products/stats/count', function(data) {
                $('#totalProducts').text(data || 0);
            });

            // Load sales chart data
            $.get('/api/orders/stats/daily', function(data) {
                const labels = [];
                const revenues = [];
                const orders = [];

                data.forEach(item => {
                    labels.push(new Date(item[0]).toLocaleDateString());
                    revenues.push(item[2]);
                    orders.push(item[1]);
                });

                createSalesChart(labels, revenues, orders);
            });

            // Load order status data
            $.get('/api/orders/stats/status', function(data) {
                const labels = [];
                const counts = [];

                data.forEach(item => {
                    labels.push(item[0]);
                    counts.push(item[1]);
                });

                createOrderStatusChart(labels, counts);
            });

            // Load top products
            $.get('/api/order-items/stats/top-selling', function(data) {
                const tbody = $('#topProductsTable');
                tbody.empty();

                data.slice(0, 5).forEach(item => {
                    const row = `
                        <tr>
                            <td>${item[0]}</td>
                            <td>${item[1]}</td>
                            <td>$${parseFloat(item[2]).toFixed(2)}</td>
                        </tr>
                    `;
                    tbody.append(row);
                });
            });

            // Load recent orders
            $.get('/api/orders/recent', function(data) {
                const tbody = $('#recentOrdersTable');
                tbody.empty();

                data.slice(0, 5).forEach(order => {
                    const statusBadge = getStatusBadge(order.status);
                    const row = `
                        <tr>
                            <td>#${order.id}</td>
                            <td>${order.customer.firstName} ${order.customer.lastName}</td>
                            <td>$${order.finalAmount.toFixed(2)}</td>
                            <td>${statusBadge}</td>
                        </tr>
                    `;
                    tbody.append(row);
                });
            });
        }

        function createSalesChart(labels, revenues, orders) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Revenue ($)',
                        data: revenues,
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        yAxisID: 'y',
                        tension: 0.1
                    }, {
                        label: 'Orders',
                        data: orders,
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        yAxisID: 'y1',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Revenue ($)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Orders'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
        }

        function createOrderStatusChart(labels, counts) {
            const ctx = document.getElementById('orderStatusChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            '#007bff',
                            '#28a745',
                            '#ffc107',
                            '#dc3545',
                            '#6c757d'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function getStatusBadge(status) {
            const badges = {
                'PENDING': '<span class="badge bg-warning">Pending</span>',
                'CONFIRMED': '<span class="badge bg-info">Confirmed</span>',
                'PROCESSING': '<span class="badge bg-primary">Processing</span>',
                'SHIPPED': '<span class="badge bg-secondary">Shipped</span>',
                'DELIVERED': '<span class="badge bg-success">Delivered</span>',
                'CANCELLED': '<span class="badge bg-danger">Cancelled</span>',
                'REFUNDED': '<span class="badge bg-dark">Refunded</span>'
            };
            return badges[status] || '<span class="badge bg-secondary">Unknown</span>';
        }
    </script>
</body>
</html>
