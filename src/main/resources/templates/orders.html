<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Egg Depot</title>
    <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">-->
</head>
<body>
    <div th:replace="~{layout :: title('Orders')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-shopping-cart"></i> Order Management</h1>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addOrderModal">
                        <i class="fas fa-plus"></i> Create Order
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <select class="form-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="PENDING">Pending</option>
                        <option value="CONFIRMED">Confirmed</option>
                        <option value="PROCESSING">Processing</option>
                        <option value="SHIPPED">Shipped</option>
                        <option value="DELIVERED">Delivered</option>
                        <option value="CANCELLED">Cancelled</option>
                        <option value="REFUNDED">Refunded</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search orders...">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-secondary w-100" onclick="filterOrders()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Date</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                                <!-- Orders will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Order Modal -->
    <div class="modal fade" id="addOrderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addOrderForm">
                        <div class="mb-3">
                            <label class="form-label">Customer</label>
                            <select class="form-select" name="customerId" required>
                                <option value="">Select Customer</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Delivery Address</label>
                            <textarea class="form-control" name="deliveryAddress" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" name="notes" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Promotion Code</label>
                            <input type="text" class="form-control" name="promotionCode">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createOrder()">Create Order</button>
                </div>
            </div>
        </div>
    </div>

    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>-->
    <script>
        let currentOrders = [];

        $(document).ready(function() {
            loadOrders();
            loadCustomers();
        });

        function loadOrders() {
            $.get('/api/orders', function(data) {
                currentOrders = data;
                displayOrders(data);
            });
        }

        function loadCustomers() {
            $.get('/api/customers', function(data) {
                const select = $('#addOrderForm [name="customerId"]');
                select.empty();
                select.append('<option value="">Select Customer</option>');
                data.forEach(customer => {
                    select.append(`<option value="${customer.id}">${customer.firstName} ${customer.lastName}</option>`);
                });
            });
        }

        function displayOrders(orders) {
            const tbody = $('#ordersTableBody');
            tbody.empty();
            
            orders.forEach(order => {
                const statusBadge = getStatusBadge(order.status);
                const row = `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.customer.firstName} ${order.customer.lastName}</td>
                        <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                        <td>$${order.finalAmount.toFixed(2)}</td>
                        <td>${statusBadge}</td>
                        <td class="table-actions">
                            <button class="btn btn-sm btn-outline-primary" onclick="viewOrder(${order.id})">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info" onclick="updateStatus(${order.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function getStatusBadge(status) {
            const badges = {
                'PENDING': '<span class="badge bg-warning">Pending</span>',
                'CONFIRMED': '<span class="badge bg-info">Confirmed</span>',
                'PROCESSING': '<span class="badge bg-primary">Processing</span>',
                'SHIPPED': '<span class="badge bg-secondary">Shipped</span>',
                'DELIVERED': '<span class="badge bg-success">Delivered</span>',
                'CANCELLED': '<span class="badge bg-danger">Cancelled</span>',
                'REFUNDED': '<span class="badge bg-dark">Refunded</span>'
            };
            return badges[status] || '<span class="badge bg-secondary">Unknown</span>';
        }

        function filterOrders() {
            const status = $('#statusFilter').val();
            const search = $('#searchInput').val().toLowerCase();
            
            let filtered = currentOrders;
            
            if (status) {
                filtered = filtered.filter(o => o.status === status);
            }
            
            if (search) {
                filtered = filtered.filter(order => 
                    order.customer.firstName.toLowerCase().includes(search) ||
                    order.customer.lastName.toLowerCase().includes(search) ||
                    order.id.toString().includes(search)
                );
            }
            
            displayOrders(filtered);
        }

        function createOrder() {
            // Implementation for creating orders
            alert('Order creation functionality would be implemented here');
        }

        function viewOrder(id) {
            // Implementation for viewing order details
            alert('View order details for order #' + id);
        }

        function updateStatus(id) {
            // Implementation for updating order status
            alert('Update status for order #' + id);
        }
    </script>
</body>
</html>
